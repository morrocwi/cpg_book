$schema: https://json-schema.org/draft/2020-12/schema
$id: https://araya.example/schemas/personal_reasoning_foundation.schema.yaml
title: Personal Reasoning Foundation and Protocol Schema
description: Schema for a non-operational, revisable Personal Reasoning foundation used as a shared interpretive
  reference between one human and multiple AI systems.
type: object
additionalProperties: false
required:
- document
- identity
- philosophical_foundation
- core_equations
- core_principles
- conceptual_distinctions
- human_multi_ai_bridge
- interpretation_protocol
- application_examples
- extension_protocol
- revision_protocol
- writing_standard
- quality_checks
properties:
  document:
    type: object
    additionalProperties: false
    required:
    - id
    - title
    - short_name
    - version
    - status
    - language
    - owner
    - created_at
    - last_reviewed_at
    - review_cycle_days
    - schema
    - document_class
    - execution_authority
    - normative_strength
    properties:
      id:
        type: string
        pattern: ^[A-Z]{2,8}-[0-9]{3}$
      title:
        type: string
        minLength: 10
        maxLength: 100
      short_name:
        type: string
        minLength: 2
        maxLength: 12
      version:
        type: string
        pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
      status:
        enum:
        - draft
        - active
        - under_review
        - deprecated
      language:
        type: array
        minItems: 1
        maxItems: 5
        uniqueItems: true
        items:
          type: string
          minLength: 2
          maxLength: 8
      owner:
        type: string
        minLength: 2
        maxLength: 100
      created_at:
        type: string
        format: date
      last_reviewed_at:
        type: string
        format: date
      review_cycle_days:
        type: integer
        minimum: 30
        maximum: 730
      schema:
        type: string
        minLength: 5
        maxLength: 150
      document_class:
        const: reasoning_foundation
      execution_authority:
        const: none
      normative_strength:
        enum:
        - interpretive_reference
        - advisory_reference
        - adopted_policy_reference
  identity:
    type: object
    additionalProperties: false
    required:
    - definition
    - thai_definition
    - purpose
    - not_a
    properties:
      definition:
        type: string
        minLength: 40
        maxLength: 500
      thai_definition:
        type: string
        minLength: 20
        maxLength: 500
      purpose:
        type: array
        minItems: 3
        maxItems: 10
        uniqueItems: true
        items:
          type: string
          minLength: 10
          maxLength: 180
      not_a:
        type: array
        minItems: 5
        maxItems: 20
        uniqueItems: true
        items:
          type: string
          minLength: 3
          maxLength: 100
  philosophical_foundation:
    type: object
    minProperties: 4
    maxProperties: 12
    additionalProperties:
      type: object
      additionalProperties: false
      required:
      - principle
      - implication
      properties:
        principle:
          type: string
          minLength: 20
          maxLength: 300
        implication:
          type: string
          minLength: 20
          maxLength: 400
  core_equations:
    type: array
    minItems: 3
    maxItems: 10
    items:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - expression
      - terms
      - meaning
      properties:
        id:
          type: string
          pattern: ^EQ-PRF-[0-9]{2}$
        name:
          type: string
          minLength: 3
          maxLength: 80
        expression:
          type: string
          minLength: 3
          maxLength: 240
        terms:
          type: object
          minProperties: 2
          maxProperties: 12
          additionalProperties:
            type: string
            minLength: 2
            maxLength: 180
        meaning:
          type: string
          minLength: 20
          maxLength: 350
  core_principles:
    type: array
    minItems: 6
    maxItems: 15
    items:
      type: object
      additionalProperties: false
      required:
      - id
      - statement
      - rationale
      - scope
      - counterexample
      - revision_trigger
      - stability
      properties:
        id:
          type: string
          pattern: ^PR-[0-9]{3}$
        statement:
          type: string
          minLength: 20
          maxLength: 220
        rationale:
          type: string
          minLength: 20
          maxLength: 500
        scope:
          type: array
          minItems: 1
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            minLength: 2
            maxLength: 60
        counterexample:
          type: string
          minLength: 10
          maxLength: 350
        revision_trigger:
          type: string
          minLength: 5
          maxLength: 350
        stability:
          enum:
          - constitutional
          - high
          - medium
          - experimental
  conceptual_distinctions:
    type: object
    minProperties: 5
    maxProperties: 15
    additionalProperties:
      type: object
      additionalProperties: false
      required:
      - definition
      - difference
      properties:
        definition:
          type: string
          minLength: 10
          maxLength: 250
        difference:
          type: string
          minLength: 20
          maxLength: 450
  human_multi_ai_bridge:
    type: object
    additionalProperties: false
    required:
    - problem
    - function
    - coherence_rule
    properties:
      problem:
        type: array
        minItems: 2
        maxItems: 10
        items:
          type: string
          minLength: 10
          maxLength: 250
      function:
        type: array
        minItems: 3
        maxItems: 12
        items:
          type: string
          minLength: 10
          maxLength: 250
      coherence_rule:
        type: string
        minLength: 20
        maxLength: 500
  interpretation_protocol:
    type: object
    additionalProperties: false
    required:
    - role
    - input
    - output
    - must_not_output
    - pseudocode
    properties:
      role:
        const: non_operational_reflection_protocol
      input:
        type: array
        minItems: 3
        maxItems: 10
        items:
          type: string
          minLength: 3
          maxLength: 160
      output:
        type: array
        minItems: 4
        maxItems: 15
        items:
          type: string
          minLength: 3
          maxLength: 160
      must_not_output:
        type: array
        minItems: 5
        maxItems: 20
        items:
          type: string
          minLength: 3
          maxLength: 160
      pseudocode:
        type: array
        minItems: 5
        maxItems: 30
        items:
          type: string
          minLength: 2
          maxLength: 240
  application_examples:
    type: array
    minItems: 3
    maxItems: 12
    items:
      type: object
      additionalProperties: false
      required:
      - domain
      - situation
      - relevant_principles
      - interpretive_use
      - not_an_instruction
      properties:
        domain:
          type: string
          minLength: 2
          maxLength: 80
        situation:
          type: string
          minLength: 10
          maxLength: 300
        relevant_principles:
          type: array
          minItems: 1
          maxItems: 8
          uniqueItems: true
          items:
            type: string
            pattern: ^PR-[0-9]{3}$
        interpretive_use:
          type: string
          minLength: 20
          maxLength: 500
        not_an_instruction:
          type: string
          minLength: 20
          maxLength: 400
  extension_protocol:
    type: object
    additionalProperties: false
    required:
    - allowed_extensions
    - prohibited_extensions
    - new_principle_requirements
    properties:
      allowed_extensions:
        type: array
        minItems: 3
        maxItems: 15
        items:
          type: string
          minLength: 3
          maxLength: 120
      prohibited_extensions:
        type: array
        minItems: 4
        maxItems: 15
        items:
          type: string
          minLength: 3
          maxLength: 180
      new_principle_requirements:
        type: array
        minItems: 5
        maxItems: 15
        items:
          type: string
          minLength: 3
          maxLength: 150
  revision_protocol:
    type: object
    additionalProperties: false
    required:
    - review_triggers
    - change_types
    - required_change_record
    - deprecation_rule
    properties:
      review_triggers:
        type: array
        minItems: 3
        maxItems: 15
        items:
          type: string
          minLength: 3
          maxLength: 180
      change_types:
        type: array
        minItems: 3
        maxItems: 12
        items:
          type: string
          minLength: 3
          maxLength: 80
      required_change_record:
        type: array
        minItems: 5
        maxItems: 15
        items:
          type: string
          minLength: 2
          maxLength: 80
      deprecation_rule:
        type: string
        minLength: 20
        maxLength: 400
  writing_standard:
    type: object
    additionalProperties: false
    required:
    - target_file_size
    - section_limits
    - style
    - yaml_format
    properties:
      target_file_size:
        type: object
        minProperties: 3
        maxProperties: 8
        additionalProperties:
          type: string
          minLength: 2
          maxLength: 350
      section_limits:
        type: object
        minProperties: 3
        maxProperties: 12
        additionalProperties:
          type: string
          minLength: 2
          maxLength: 160
      style:
        type: array
        minItems: 6
        maxItems: 20
        items:
          type: string
          minLength: 10
          maxLength: 220
      yaml_format:
        type: object
        minProperties: 6
        maxProperties: 15
        additionalProperties:
          type:
          - string
          - boolean
          - integer
  quality_checks:
    type: array
    minItems: 8
    maxItems: 25
    items:
      type: string
      minLength: 10
      maxLength: 250
